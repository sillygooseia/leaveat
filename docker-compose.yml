# LeaveAt — full local development stack (Docker)
#
# Starts Postgres, Redis, backend (port 3002), license (port 3003), and
# frontend Angular dev server (http://localhost:4201/).
#
# Requires a .env file at leaveat/.env with:
#   NPM_TOKEN=<your-verdaccio-jwt>
#
# Usage:
#   docker compose up --build    # first time or after dependency changes
#   docker compose up            # subsequent starts
#   docker compose down          # stop and remove containers
#   docker compose down -v       # also wipe volumes (fresh DB / node_modules)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: leaveat
      POSTGRES_PASSWORD: leaveat
      POSTGRES_DB: leaveat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaveat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NPM_TOKEN: ${NPM_TOKEN}
    image: sillygooseia/leaveat-backend:local
    container_name: leaveat-backend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://leaveat:leaveat@postgres:5432/leaveat
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/usr/src/app
      - leaveat_backend_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  license:
    build:
      context: ./license
      dockerfile: Dockerfile.dev
      args:
        NPM_TOKEN: ${NPM_TOKEN}
    image: sillygooseia/leaveat-license:local
    container_name: leaveat-license
    restart: unless-stopped
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - DATABASE_URL=postgresql://leaveat:leaveat@postgres:5432/leaveat
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./license:/usr/src/app
      - leaveat_license_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NPM_TOKEN: ${NPM_TOKEN}
    image: sillygooseia/leaveat-frontend:local
    container_name: leaveat-frontend
    restart: unless-stopped
    ports:
      - "4201:4201"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run start:docker
    volumes:
      - ./frontend:/usr/src/app
      - leaveat_frontend_modules:/usr/src/app/node_modules
      - ./frontend/proxy.conf.docker.json:/usr/src/app/proxy.conf.json
    depends_on:
      - backend
      - license

volumes:
  postgres_data:
  redis_data:
  leaveat_backend_modules:
  leaveat_license_modules:
  leaveat_frontend_modules:
