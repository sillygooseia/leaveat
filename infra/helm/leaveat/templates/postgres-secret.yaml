{{- if and .Values.postgres.enabled .Values.postgres.password }}
# Secret created from values (dev/testing only).
# For production, pre-create this secret with provision-leaveat-secrets.ps1 and leave postgres.password empty.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leaveat.fullname" . }}-postgres-secret
  labels:
    app: {{ include "leaveat.name" . }}-postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_URL: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ include "leaveat.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
{{- end }}
