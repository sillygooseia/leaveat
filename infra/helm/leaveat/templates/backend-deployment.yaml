apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "leaveat.fullname" . }}-backend
  labels:
    app: {{ include "leaveat.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "leaveat.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "leaveat.name" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: PORT
              value: "{{ .Values.backend.port }}"
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-redis-secret
                  key: REDIS_URL
            {{- end }}
            - name: CLEANUP_INTERVAL_MS
              value: "{{ .Values.backend.cleanupIntervalMs }}"
            {{- if .Values.postgres.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-postgres-secret
                  key: DATABASE_URL
            {{- end }}
            - name: LICENSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: LICENSE_PUBLIC_KEY
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: SMTP_SECURE
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: SMTP_PASS
                  optional: true
            - name: MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: MAIL_FROM
                  optional: true
            - name: MAIL_NOTIFY
              valueFrom:
                secretKeyRef:
                  name: {{ include "leaveat.fullname" . }}-backend-secret
                  key: MAIL_NOTIFY
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/license/public-key
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/license/public-key
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
