{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "leaveat.fullname" . }}-redis-headless
  labels:
    app: {{ include "leaveat.name" . }}-redis
spec:
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: {{ include "leaveat.name" . }}-redis
{{- end }}