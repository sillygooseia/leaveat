{{- if .Values.redis.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "leaveat.fullname" . }}-redis
spec:
  podSelector:
    matchLabels:
      app: {{ include "leaveat.name" . }}-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - {{ include "leaveat.name" . }}-backend
                  - {{ include "leaveat.licenseName" . }}
                  - {{ include "leaveat.name" . }}-redis-backup
      ports:
        - protocol: TCP
          port: 6379
{{- end }}