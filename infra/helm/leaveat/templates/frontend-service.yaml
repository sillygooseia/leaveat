apiVersion: v1
kind: Service
metadata:
  name: {{ include "leaveat.fullname" . }}-frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "leaveat.name" . }}-frontend
  ports:
    - protocol: TCP
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
