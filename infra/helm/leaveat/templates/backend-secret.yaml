{{- if .Values.backend.licensePublicKey }}
# Secret created from values (dev/testing only).
# For production, pre-create this secret with provision-leaveat-secrets.ps1 and leave backend.licensePublicKey empty.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leaveat.fullname" . }}-backend-secret
  labels:
    app: {{ include "leaveat.name" . }}
type: Opaque
stringData:
  LICENSE_PUBLIC_KEY: {{ .Values.backend.licensePublicKey | quote }}
{{- end }}
