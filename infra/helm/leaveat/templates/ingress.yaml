{{- if .Values.ingress.enabled }}
{{- $redirect := .Values.ingress.redirectToSuite }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "leaveat.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    {{- if $redirect.enabled }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s-redirect-to-suite@kubernetescrd" .Release.Namespace (include "leaveat.fullname" .) }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- range .Values.ingress.aliasHosts }}
        - {{ . }}
        {{- end }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/license
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.licenseName" . }}
                port:
                  number: {{ .Values.license.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
    {{- range .Values.ingress.aliasHosts }}
    - host: {{ . }}
      http:
        paths:
          - path: /api/license
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" $ }}-license
                port:
                  number: {{ $.Values.license.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.frontend.port }}
    {{- end }}
{{- end }}

{{- $suiteIngress := .Values.suiteIngress }}
{{- $suiteStripPrefix := default "" $suiteIngress.stripPrefix }}
{{- if $suiteIngress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "leaveat.fullname" . }}-suite
  annotations:
    kubernetes.io/ingress.class: {{ $suiteIngress.className }}
    cert-manager.io/cluster-issuer: {{ $suiteIngress.clusterIssuer }}
    {{- if and $suiteStripPrefix (ne $suiteStripPrefix "") (ne $suiteStripPrefix "/") }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s-suite-strip-prefix@kubernetescrd" .Release.Namespace (include "leaveat.fullname" .) }}
    {{- end }}
spec:
  tls:
    - hosts:
        - {{ $suiteIngress.host }}
      secretName: {{ $suiteIngress.tlsSecretName }}
  rules:
    - host: {{ $suiteIngress.host }}
      http:
        paths:
          - path: {{ $suiteIngress.pathPrefix }}/api/license
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" . }}-license
                port:
                  number: {{ .Values.license.port }}
          - path: {{ $suiteIngress.pathPrefix }}/api
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: {{ $suiteIngress.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "leaveat.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}

{{- if and $suiteIngress.enabled $suiteStripPrefix (ne $suiteStripPrefix "") (ne $suiteStripPrefix "/") }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "leaveat.fullname" . }}-suite-strip-prefix
spec:
  stripPrefix:
    forceSlash: false
    prefixes:
      - {{ $suiteStripPrefix | quote }}
{{- end }}

{{- if and .Values.ingress.enabled .Values.ingress.redirectToSuite.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "leaveat.fullname" . }}-redirect-to-suite
spec:
  redirectRegex:
    regex: {{ default "^https?://(?:www\\.)?leaveat\\.com/?(.*)" .Values.ingress.redirectToSuite.regex | quote }}
    replacement: {{ default "https://bafgo.com/schedule/$1" .Values.ingress.redirectToSuite.replacement | quote }}
    permanent: {{ default true .Values.ingress.redirectToSuite.permanent }}
{{- end }}
