{{- if or .Values.license.privateKeyPem .Values.license.publicKeyPem .Values.license.lemonsqueezyApiKey .Values.license.lemonsqueezyStoreId .Values.license.lemonsqueezyVariantId .Values.license.lemonsqueezyWebhookSecret }}
# Secret created from values (dev/testing only).
# For production, pre-create this secret with provision-leaveat-secrets.ps1 and leave license.* secret values empty.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leaveat.fullname" . }}-license-secret
  labels:
    app: {{ include "leaveat.name" . }}
type: Opaque
stringData:
  {{- if .Values.license.privateKeyPem }}
  PRIVATE_KEY_PEM: {{ .Values.license.privateKeyPem | quote }}
  {{- end }}
  {{- if .Values.license.publicKeyPem }}
  PUBLIC_KEY_PEM: {{ .Values.license.publicKeyPem | quote }}
  {{- end }}
  {{- if .Values.license.lemonsqueezyApiKey }}
  LEMONSQUEEZY_API_KEY: {{ .Values.license.lemonsqueezyApiKey | quote }}
  {{- end }}
  {{- if .Values.license.lemonsqueezyStoreId }}
  LEMONSQUEEZY_STORE_ID: {{ .Values.license.lemonsqueezyStoreId | quote }}
  {{- end }}
  {{- if .Values.license.lemonsqueezyVariantId }}
  LEMONSQUEEZY_VARIANT_ID: {{ .Values.license.lemonsqueezyVariantId | quote }}
  {{- end }}
  {{- if .Values.license.lemonsqueezyWebhookSecret }}
  LEMONSQUEEZY_WEBHOOK_SECRET: {{ .Values.license.lemonsqueezyWebhookSecret | quote }}
  {{- end }}
{{- end }}