{{- if or .Values.license.privateKeyPem .Values.license.publicKeyPem .Values.license.stripeSecretKey .Values.license.stripePriceId .Values.license.stripeWebhookSecret .Values.license.groqApiKey }}
# Secret created from values (dev/testing only).
# For production, pre-create this secret with provision-leaveat-secrets.ps1 and leave license.* secret values empty.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "leaveat.fullname" . }}-license-secret
  labels:
    app: {{ include "leaveat.name" . }}
type: Opaque
stringData:
  {{- if .Values.license.privateKeyPem }}
  PRIVATE_KEY_PEM: {{ .Values.license.privateKeyPem | quote }}
  {{- end }}
  {{- if .Values.license.publicKeyPem }}
  PUBLIC_KEY_PEM: {{ .Values.license.publicKeyPem | quote }}
  {{- end }}
  {{- if .Values.license.stripeSecretKey }}
  STRIPE_SECRET_KEY: {{ .Values.license.stripeSecretKey | quote }}
  {{- end }}
  {{- if .Values.license.stripePriceId }}
  STRIPE_PRICE_ID: {{ .Values.license.stripePriceId | quote }}
  {{- end }}
  {{- if .Values.license.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.license.stripeWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.license.groqApiKey }}
  GROQ_API_KEY: {{ .Values.license.groqApiKey | quote }}
  {{- end }}
{{- end }}